<svg width="640" height="225" viewBox="30 50 640 225" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jadeRing" x1="170" y1="40" x2="170" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CFEFE7"/>
      <stop offset="45%" stop-color="#8FCFC0"/>
      <stop offset="100%" stop-color="#5AAE9B"/>
    </linearGradient>

    <linearGradient id="jadeText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7CC7B6"/>
      <stop offset="100%" stop-color="#3E8F7E"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(40,30)">
    <!-- Outer jade bangle -->
    <circle cx="130" cy="130" r="86" stroke="url(#jadeRing)" stroke-width="24" fill="none" filter="url(#softGlow)"/>

    <!-- subtle inner shine -->
    <ellipse cx="104" cy="84" rx="26" ry="10" transform="rotate(-22 104 84)" fill="white" fill-opacity="0.45"/>
    <ellipse cx="165" cy="175" rx="18" ry="6" transform="rotate(-22 165 175)" fill="white" fill-opacity="0.18"/>

    <!-- Chinese mark -->
    <g transform="translate(78,76)">
      <text x="0" y="42"
            font-size="44"
            font-family="Noto Serif SC, Songti SC, STSong, serif"
            font-weight="600"
            fill="url(#jadeText)"
            fill-opacity="0.92">冰</text>
      <text x="34" y="78"
            font-size="44"
            font-family="Noto Serif SC, Songti SC, STSong, serif"
            font-weight="600"
            fill="url(#jadeText)"
            fill-opacity="0.72">冰</text>
    </g>
  </g>

  <!-- Brand name -->
  <g transform="translate(300,92)">
    <text x="0" y="50"
          font-size="54"
          font-family="Cormorant Garamond, Georgia, serif"
          font-weight="600"
          letter-spacing="1.5"
          fill="#23443D">Bing Bing Jade</text>

    <line x1="2" y1="72" x2="350" y2="72" stroke="#8FCFC0" stroke-width="1.5" stroke-opacity="0.75"/>

    <text x="0" y="112"
          font-size="20"
          font-family="Inter, Helvetica, Arial, sans-serif"
          letter-spacing="4"
          fill="#5B7F76">NATURAL JADEITE</text>

    <text x="0" y="150"
          font-size="18"
          font-family="Noto Serif SC, Songti SC, STSong, serif"
          letter-spacing="2"
          fill="#6D8F87">冰韵清鸣</text>
  </g>
</svg>